{% extends "base.html" %}

{% block title %}
Sign Up
{% endblock %}

{% block content %}
<h3 align="center">Login</h3>
<form method="POST">

  <div class="form-group">
    <label for="email">Email Address</label>
    <input
      type="email"
      id="email"
      name="email"
      class="form-control"
      placeholder="Enter Email"
      required
    >
  </div>

  <div class="form-group">
    <label for="password">Password</label>
    <input
      type="password"
      id="password"
      name="password"
      class="form-control"
      placeholder="Enter Password"
      required
    >
  </div>

  <br>

  <button type="submit" class="btn btn-primary ">
    Login
  </button>
  {% endblock %}
