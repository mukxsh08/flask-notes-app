{% extends "base.html" %}

{% block title %}
Sign Up
{% endblock %}

{% block content %}


<h3 align="center">Sign Up</h3>

<form method="POST">

  <div class="form-group">
    <label for="email">Email Address</label>
    <input
      type="email"
      id="email"
      name="email"
      class="form-control"
      placeholder="Enter Email"
    >
  </div>

  <div class="form-group">
    <label for="firstname">First Name</label>
    <input
      type="text"
      id="firstname"
      name="firstname"
      class="form-control"
      placeholder="Enter First Name"
      
    >
  </div>

  <div class="form-group">
    <label for="password">Password</label>
    <input
      type="password"
      id="password"
      name="password"
      class="form-control"
      placeholder="Enter Password"
      
    >
  </div>

  <div class="form-group">
    <label for="password2">Confirm Password</label>
    <input
      type="password"
      id="password2"
      name="password2"
      class="form-control"
      placeholder="Confirm Password"
      
    >
  </div>

  <br>

  <button type="submit" class="btn btn-primary ">
    Submit
  </button>

</form>

{% endblock %}
